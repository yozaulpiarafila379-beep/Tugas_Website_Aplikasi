<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Sistem Pendataan Barang Gudang</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3a8a,#2563eb,#60a5fa);
}

.login-container{
    width:400px;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    color:#1e3a8a;
}

.logo p{
    color:#666;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

.info{
    margin-top:15px;
    text-align:center;
    font-size:13px;
    color:#666;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:#777;
}
</style>
</head>
<body>

<div class="login-container">

    <div class="logo">
        <h1>📦 GUDANGKU</h1>
        <p>Sistem Pendataan Barang Gudang</p>
    </div>

    <h2>Login Admin</h2>

    <form onsubmit="login(event)">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Masukkan Username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan Password">
        </div>

        <button type="submit">LOGIN</button>
    </form>

    <div class="info">
        Username: <b>admin</b><br>
        Password: <b>admin123</b>
    </div>

    <div class="footer">
        © 2026 Sistem Informasi Pendataan Barang di Gudang
    </div>

</div>

<script>
function login(event){
    event.preventDefault();

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username === "admin" && password === "admin123"){
        alert("Login Berhasil!");

        document.body.innerHTML = `
        <div style="font-family:Segoe UI;text-align:center;padding:100px">
            <h1>📦 Dashboard Gudang</h1>
            <h2>Selamat Datang, Admin</h2>
            <p>Anda berhasil login ke Sistem Pendataan Barang Gudang.</p>
        </div>
        `;
    }else{
        alert("Username atau Password Salah!");
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory & Constructors</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    font-family:'Courier New', monospace;

    background:
    radial-gradient(circle at top left,#1e1b4b,transparent 45%),
    radial-gradient(circle at bottom right,#0f766e,transparent 45%),
    #020617;

    color:#e0f2fe;
}


/* BACKGROUND GLOW */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    linear-gradient(
        120deg,
        rgba(34,211,238,.12),
        rgba(168,85,247,.12)
    );

    z-index:-1;

}



/* HEADER */

.header{

    background:
    rgba(2,6,23,.75);

    backdrop-filter:
    blur(15px);

    border-bottom:
    1px solid rgba(34,211,238,.5);

}



/* JUDUL UTAMA */

.header h1{

    background:
    linear-gradient(
        90deg,
        #22d3ee,
        #a855f7
    );

    -webkit-background-clip:text;

    color:transparent;

    text-shadow:
    0 0 15px rgba(34,211,238,.7);

}



/* IDENTITAS */

.identitas p{

    color:#67e8f9;

    text-shadow:
    0 0 10px #22d3ee;

}



/* GARIS HEADER */

hr{

    background:
    linear-gradient(
    90deg,
    #22d3ee,
    #a855f7
    ) !important;

}



/* BOX SECTION */

.section{

    margin:20px;

    padding:20px;

    border-radius:18px;

    background:
    rgba(15,23,42,.70);

    border:
    1px solid rgba(34,211,238,.4);

    backdrop-filter:
    blur(12px);


    box-shadow:

    0 0 20px rgba(34,211,238,.2);

    transition:.4s;

}



.section:hover{

    transform:
    translateY(-8px);


    border-color:#a855f7;


    box-shadow:

    0 0 30px rgba(168,85,247,.6);

}



/* JUDUL SOAL */

.section h2{

    color:#22d3ee !important;

    text-shadow:

    0 0 12px #22d3ee;

}



.section h2::after{

    content:"";

    display:block;

    width:100%;

    height:2px;

    margin-top:8px;


    background:

    linear-gradient(
    90deg,
    #22d3ee,
    #a855f7
    );

}



/* TEKS */

.section p,
.nama{

    color:#bae6fd;

    text-shadow:

    0 0 6px rgba(34,211,238,.6);

}



/* CODE BOX */

.code-box{

    background:#020617;

    padding:15px;

    border-radius:12px;


    border:

    1px solid #22d3ee;


    box-shadow:

    inset 0 0 20px rgba(34,211,238,.2);


    overflow:auto;

}



/* WARNA CODE */

.keyword{

    color:#c084fc;

}


.type{

    color:#22d3ee;

}


.string{

    color:#facc15;

}


.comment{

    color:#94a3b8;

}



/* BUTTON */

.button{

    margin-top:10px;

    padding:9px 18px;


    background:

    linear-gradient(
    90deg,
    #22d3ee,
    #a855f7
    );


    border:none;

    cursor:pointer;

    color:white;


    border-radius:10px;


    font-weight:bold;


    box-shadow:

    0 0 15px rgba(168,85,247,.5);


    transition:.3s;

}



.button:hover{

    transform:scale(1.05);

    box-shadow:

    0 0 30px #22d3ee;

}



/* IMAGE */

img{

    margin-top:10px;

    max-width:100%;

    height:auto;

    display:none;

    border-radius:10px;

}



</style>
<script>
let activeElement = null;

function showContent(id) {
    if (activeElement) {
        activeElement.style.display = "none";
    }

    const el = document.getElementById(id);

    if (activeElement === el) {
        activeElement = null;
        return;
    }

    el.style.display = "block";
    activeElement = el;
}

// TAMBAHKAN DI SINI (di bawah showContent, masih dalam <script>)
function runDart(id, url) {
    if (activeElement) {
        activeElement.style.display = "none";
    }

    const frame = document.getElementById(id);

    if (activeElement === frame) {
        activeElement = null;
        return;
    }

    frame.src = url;
    frame.style.display = "block";

    activeElement = frame;
}
</script>
</head>

<body>
<div class="container">

<div class="header" style="padding: 30px; text-align:center;">
    
    <!-- JUDUL UTAMA -->
    <h1 style="font-size: clamp(2.2em, 6vw, 2.8em); margin: 0; line-height: 1.3; font-weight: bold;">Factory</h1>
    <h1 style="font-size: clamp(2.2em, 6vw, 2.8em); margin: 5px 0; line-height: 1.3; font-weight: bold;">&</h1>
    <h1 style="font-size: clamp(2.2em, 6vw, 2.8em); margin: 0; line-height: 1.3; font-weight: bold;">Constructors</h1>

    <!-- GARIS PEMBATAS -->
    <hr style="width: 60%; max-width: 300px; margin: 20px auto; border: none; height: 2px; background-color: #38bdf8;">

    <!-- DATA DIRI -->
    <div class="identitas">
        <p>Yoza Ulpia Rafila</p>
        <p>251410004</p>
        <p>SI2A</p>
    </div>

</div>
